name: Test Runner

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Echo test
        run: echo "GitHub Actions runner works!"
      
      - name: Show runner info
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          echo "GitHub event: $GITHUB_EVENT_NAME"
