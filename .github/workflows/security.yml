name: Security Hard Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (ERROR findings fail)
        continue-on-error: true
        run: semgrep scan --config .semgrep.yml --severity ERROR --error --json --output semgrep-report.json .

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: ignore
          retention-days: 7

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run dependency audit (high/critical fail)
        run: |
          set +e
          corepack pnpm audit --audit-level high --json > audit-report.json
          AUDIT_EXIT=$?
          set -e
          cat audit-report.json
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "Dependency audit found high/critical vulnerabilities"
            exit $AUDIT_EXIT
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit-report.json
          if-no-files-found: ignore
          retention-days: 7
