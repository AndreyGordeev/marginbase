name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint_typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules/.cache
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Security audit
        run: corepack pnpm audit --audit-level moderate
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules/.cache
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build all packages
        run: corepack pnpm build

      - name: Build web app
        run: corepack pnpm --filter @marginbase/web build

      - name: Check bundle size
        run: |
          DIST_SIZE=$(du -sh apps/web/dist | cut -f1)
          echo "Web app dist size: $DIST_SIZE"
          # Fail if dist > 10MB (currently ~2-3MB)
          SIZE_BYTES=$(du -sb apps/web/dist | cut -f1)
          if [ "$SIZE_BYTES" -gt 10485760 ]; then
            echo "Bundle size exceeds 10MB threshold!"
            exit 1
          fi

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules/.cache
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build domain-core
        run: corepack pnpm --filter @marginbase/domain-core build

      - name: Build storage
        run: corepack pnpm --filter @marginbase/storage build

      - name: Build api-client
        run: corepack pnpm --filter @marginbase/api-client build

      - name: Build entitlements
        run: corepack pnpm --filter @marginbase/entitlements build

      - name: Build telemetry
        run: corepack pnpm --filter @marginbase/telemetry build

      - name: Build reporting
        run: corepack pnpm --filter @marginbase/reporting build

      - name: Build testkit
        run: corepack pnpm --filter @marginbase/testkit build

      - name: i18n key parity
        run: corepack pnpm i18n:parity

      - name: Unit and integration tests
        run: corepack pnpm test

      - name: Coverage gates
        run: corepack pnpm test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules/.cache
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build testkit
        run: corepack pnpm --filter @marginbase/testkit build

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(corepack pnpm list @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: corepack pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Install Playwright system deps (if browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: corepack pnpm exec playwright install-deps

      - name: Build web app for E2E
        run: corepack pnpm --filter @marginbase/web build

      - name: Run E2E tests
        run: corepack pnpm exec playwright test -c playwright.config.ts --reporter=html,line --grep-invert "visual:"
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  # ============================================================================
  # Hard Gate Tests — Phase 1A (Critical Compliance Tests)
  # ============================================================================
  # These must PASS to unblock PR merge. They validate:
  # - Privacy (financial data never leaves device)
  # - Offline (app works without network)
  # - Layout Guards (forms never overlap/collapse)
  # - Accessibility (WCAG 2.1 AA minimum compliance)

  privacy-hard-gate:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
