      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(corepack pnpm list @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (if browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: corepack pnpm exec playwright install-deps chromium

      - name: Build web app for E2E
        run: corepack pnpm --filter @marginbase/web build

      - name: 🔒 Privacy Hard Gate Test
        run: corepack pnpm exec playwright test privacy-hard-gate.spec.ts --reporter=html,line
        env:
          CI: true

      - name: Upload Privacy Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: privacy-hard-gate-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

